name: Build Armbian Atomic Pi image

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "atomicpi-minimal"
        type: choice
        options:
          - atomicpi-minimal
          - atomicpi-server
          - atomicpi-dev

# One build at a time; cancel in-progress on new dispatch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout Atomicty_Pi
        uses: actions/checkout@v4
        with:
          path: Atomicty_Pi

      - name: Checkout Armbian build framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Install board config and symlink userpatches
        run: |
          # Armbian hardcodes USERPATCHES_PATH=${SRC}/userpatches and ignores
          # the cmdline arg. Symlinks are the supported workaround.
          ARMBIAN_UP="${GITHUB_WORKSPACE}/armbian-build/userpatches"
          OUR_UP="${GITHUB_WORKSPACE}/Atomicty_Pi/armbian/userpatches"
          BOARD_CONF="${GITHUB_WORKSPACE}/Atomicty_Pi/armbian/atomic-pi.conf"
          BOARDS_DIR="${GITHUB_WORKSPACE}/armbian-build/config/boards"

          mkdir -p "$ARMBIAN_UP"
          for item in "$OUR_UP"/*; do
            ln -sf "$item" "$ARMBIAN_UP/$(basename "$item")"
          done

          ln -sf "$BOARD_CONF" "${BOARDS_DIR}/atomic-pi.conf"

          echo "Userpatches symlinked: $ARMBIAN_UP"
          echo "Board config installed: ${BOARDS_DIR}/atomic-pi.conf"

      - name: Build image
        working-directory: armbian-build
        run: |
          ./compile.sh build "${{ inputs.profile }}" \
            KERNEL_CONFIGURE=no

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomicpi-${{ inputs.profile }}-${{ github.sha }}
          path: |
            armbian-build/output/images/*.img
            armbian-build/output/images/*.sha
            armbian-build/output/images/*.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.profile }}-${{ github.sha }}
          path: armbian-build/output/logs/
          retention-days: 3
