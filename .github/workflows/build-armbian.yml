name: Build Armbian Atomic Pi image

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Atomic Pi profile"
        required: true
        default: "atomicpi-minimal"
        type: choice
        options:
          - atomicpi-minimal
          - atomicpi-server
          - atomicpi-dev

# Only one build at a time; cancel in-progress runs on new push.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout Atomicty_Pi
        uses: actions/checkout@v4
        with:
          path: Atomicty_Pi

      - name: Checkout Armbian build framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Build image
        working-directory: armbian-build
        run: |
          ./compile.sh build \
            USERPATCHES_PATH="${GITHUB_WORKSPACE}/Atomicty_Pi/armbian/userpatches" \
            "${{ inputs.profile }}"

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: atomicpi-armbian-${{ inputs.profile }}-${{ github.sha }}
          path: armbian-build/output/images/*
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.profile }}-${{ github.sha }}
          path: armbian-build/output/debug/
          retention-days: 3
