# Armbian build config — Atomic Pi, server image (fuller package set)
# Adds: network tools, I2C/SPI utils, audio stack, development tools.

BOARD=uefi-x86
RELEASE=trixie
BRANCH=current

BUILD_DESKTOP=no
BUILD_MINIMAL=no
KERNEL_CONFIGURE=no

COMPRESS_OUTPUTIMAGE=sha,img,xz
VENDOR="AtomicPi"

# Extra packages installed on top of Armbian server base
PACKAGE_LIST_ADDITIONAL="i2c-tools spi-tools alsa-utils pulseaudio pulseaudio-utils \
  build-essential dkms linux-headers-current-x86 git python3 python3-pip \
  firmware-realtek firmware-mediatek firmware-misc-nonfree \
  bluez bluetooth network-manager wpasupplicant"
