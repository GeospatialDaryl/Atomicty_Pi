# config-atomicpi-desktop.conf
# XFCE desktop image. Build only after headless images are proven stable.
# Usage: ./compile.sh build USERPATCHES_PATH=<repo>/armbian/userpatches atomicpi-desktop

source "${USERPATCHES_PATH}/config-atomicpi-common.conf"

BUILD_MINIMAL=no
BUILD_DESKTOP=yes
NETWORKING_STACK="network-manager"

# XFCE is practical for 2 GB RAM; avoid GNOME/KDE.
DESKTOP_ENVIRONMENT=xfce
DESKTOP_ENVIRONMENT_CONFIG_NAME=config_base

INSTALL_HEADERS=no

FIXED_IMAGE_SIZE=11000
