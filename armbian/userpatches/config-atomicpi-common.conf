# config-atomicpi-common.conf
# Shared base settings sourced by all Atomic Pi build profiles.
# Do not use this file directly; source it from a profile config.

BOARD=atomic-pi
RELEASE=trixie
BRANCH=current

KERNEL_CONFIGURE=no
ROOTFS_TYPE=ext4
SECTOR_SIZE=512

# No auto root login on console at first run.
CONSOLE_AUTOLOGIN=no

# Regenerate SSH host keys on first boot.
OPENSSHD_REGENERATE_HOST_KEYS=yes

# Build log visible in terminal (useful for CI debugging).
PROGRESS_DISPLAY=plain
PROGRESS_LOG_TO_FILE=yes

# Armbian's first-run wizard freeze control.
BSPFREEZE=no

# Compressed image + SHA256 checksum.
COMPRESS_OUTPUTIMAGE="sha,xz"

# Enables the atomicpi-profile extension for package and hook injection.
ENABLE_EXTENSIONS="atomicpi-profile"

# Metadata marker — readable inside the image at /etc/atomicpi/profile.
ATOMICPI_PROFILE=yes
