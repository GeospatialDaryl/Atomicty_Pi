# Atomic Pi ALSA configuration
# Card 0: HDA Intel HDMI  (hdmi_out alias)
# Card 1: XMOS USB Audio  (xmos alias) — TI TAS5719 → powered speaker outputs
#
# Verify card name with: aplay -l
# If XMOS enumerates under a different name, update "card" values below.

pcm.xmos {
    type hw
    card "XMOS"
}
ctl.xmos {
    type hw
    card "XMOS"
}

pcm.hdmi_out {
    type hw
    card "Intel"
    device 3
}

# Default: XMOS powered outputs. Change to "Intel"/device 3 for HDMI default.
pcm.!default {
    type plug
    slave.pcm "hw:XMOS,0"
}
ctl.!default {
    type hw
    card "XMOS"
}
