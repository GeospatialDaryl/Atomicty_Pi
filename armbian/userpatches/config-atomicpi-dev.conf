# config-atomicpi-dev.conf
# Development image: kernel headers, DKMS, GPIO/I2C/SPI tools, Rust, Python.
# Usage: ./compile.sh build USERPATCHES_PATH=<repo>/armbian/userpatches atomicpi-dev

source "${USERPATCHES_PATH}/config-atomicpi-common.conf"

BUILD_MINIMAL=no
BUILD_DESKTOP=no
NETWORKING_STACK="network-manager"

# Headers pre-installed for DKMS, out-of-tree drivers, sensor experiments.
INSTALL_HEADERS=yes

FIXED_IMAGE_SIZE=9000
