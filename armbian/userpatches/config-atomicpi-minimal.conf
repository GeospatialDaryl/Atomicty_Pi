# config-atomicpi-minimal.conf
# Bare-bones headless image for boot testing, SSH validation, and eMMC install.
# Usage: ./compile.sh build USERPATCHES_PATH=<repo>/armbian/userpatches atomicpi-minimal

source "${USERPATCHES_PATH}/config-atomicpi-common.conf"

BUILD_MINIMAL=yes
BUILD_DESKTOP=no
NETWORKING_STACK="systemd-networkd"

INSTALL_HEADERS=no

FIXED_IMAGE_SIZE=3500
