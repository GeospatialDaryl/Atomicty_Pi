# Armbian build config — Atomic Pi, minimal server image
# Usage: ./compile.sh USERPATCHES_PATH=<repo>/armbian/userpatches @<repo>/armbian/config-atomicpi-minimal.conf
#
# Armbian uefi-x86 provides: GPT/EFI layout, GRUB bootloader, amd64 kernel,
# standard SBC-style image. We add Atomic Pi hardware layer via userpatches.

BOARD=uefi-x86
RELEASE=trixie
BRANCH=current

BUILD_DESKTOP=no
BUILD_MINIMAL=yes
KERNEL_CONFIGURE=no

# Output: compressed image + SHA256
COMPRESS_OUTPUTIMAGE=sha,img,xz

# Image filename tag so we can identify builds
VENDOR="AtomicPi"
